          type: string
        status:
          $ref: "#/components/schemas/RecordingDownloadStatus"
        downloadUrl:
          description: "Short-lived signed CDN URL, re-minted each GET. Present only when COMPLETED on a standard (non-BYOS) project."
          type: string
